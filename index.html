const getInitialCardState = () => ({ interval: 0, ease: 2.5, repetitions: 0, nextReview: Date.now(), lastResult: null });
const updateCardState = (card, q) => {
  let { interval, ease, repetitions } = card;
  if (q < 3) { repetitions = 0; interval = 0; }
  else {
    if (repetitions === 0) interval = 1;
    else if (repetitions === 1) interval = 3;
    else interval = Math.round(interval * ease);
    ease = Math.max(1.3, ease + (0.1 - (5 - q) * (0.08 + (5 - q) * 0.02)));
    repetitions += 1;
  }
  return { interval, ease, repetitions, nextReview: Date.now() + interval * 864e5, lastResult: q };
};
const shuffle = (a) => { const b = [...a]; for (let i = b.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [b[i], b[j]] = [b[j], b[i]]; } return b; };

  const [onbTimeLeft, setOnbTimeLeft] = useState(60);
  const [onbStarted, setOnbStarted] = useState(false);
  const [onbFinished, setOnbFinished] = useState(false);
  const [onbOptions, setOnbOptions] = useState([]);
  const [onbAnswer, setOnbAnswer] = useState(null);
  const [fadeIn, setFadeIn] = useState(true);
  const timerRef = useRef(null);

  const getWordsForLevel = useCallback((level) => {
    return Object.entries(WORD_DATABASE[level] || {}).flatMap(([topic, words]) => words.map(w => ({ ...w, topic, level })));
  }, []);
  const getWordsForTopic = useCallback((level, topic) => {
    return (WORD_DATABASE[level]?.[topic] || []).map(w => ({ ...w, topic, level }));
  }, []);
  const getCardKey = (w) => `${w.level}:${w.gr}`;

  const getStats = useCallback(() => {
    const all = [...getWordsForLevel("A2"), ...getWordsForLevel("B1")];
    let learned = 0, reviewing = 0, newW = 0;
    all.forEach(w => { const s = cardStates[`${w.level}:${w.gr}`]; if (!s) newW++; else if (s.repetitions >= 3) learned++; else reviewing++; });
    return { total: all.length, learned, reviewing, new: newW };
  }, [cardStates, getWordsForLevel]);

  const getWordsByStatus = useCallback((f) => {
    return [...getWordsForLevel("A2"), ...getWordsForLevel("B1")].filter(w => {
      const s = cardStates[`${w.level}:${w.gr}`];
      if (f === "all") return true;
      if (f === "new") return !s;
      if (f === "learned") return s && s.repetitions >= 3;
      if (f === "reviewing") return s && s.repetitions > 0 && s.repetitions < 3;
      return true;
    });
  }, [cardStates, getWordsForLevel]);

  // Animate screen transitions
  const navigateTo = (s) => { setFadeIn(false); setTimeout(() => { setScreen(s); setFadeIn(true); }, 120); };

  // Onboarding
  const startOnboarding = () => {
    const w = shuffle(ONBOARDING_WORDS);
    setOnbWords(w); setOnbIndex(0); setOnbCorrect(0); setOnbTimeLeft(60);
    setOnbStarted(true); setOnbFinished(false); setOnbAnswer(null);
    const correct = w[0]; const others = shuffle(w.filter(x => x.gr !== correct.gr)).slice(0, 3);
    setOnbOptions(shuffle([correct, ...others]));
    timerRef.current = setInterval(() => {
      setOnbTimeLeft(p => { if (p <= 1) { clearInterval(timerRef.current); setOnbFinished(true); return 0; } return p - 1; });
    }, 1000);
  };

  const handleOnbAnswer = (opt) => {
    if (onbAnswer !== null || onbFinished) return;
    const isCorrect = opt.gr === onbWords[onbIndex].gr;
    setOnbAnswer(opt.gr);
    if (isCorrect) setOnbCorrect(p => p + 1);
    setTimeout(() => {
      const next = onbIndex + 1;
      if (next >= onbWords.length || onbTimeLeft <= 0) { clearInterval(timerRef.current); setOnbFinished(true); }
      else {
        setOnbIndex(next); setOnbAnswer(null);
        const c = onbWords[next]; const o = shuffle(onbWords.filter(x => x.gr !== c.gr)).slice(0, 3);
        setOnbOptions(shuffle([c, ...o]));
      }
    }, 500);
  };

  const finishOnboarding = (lvl) => { setSelectedLevel(lvl); setHasCompletedOnboarding(true); navigateTo("home"); };
  useEffect(() => () => { if (timerRef.current) clearInterval(timerRef.current); }, []);

  const startSession = (level, topic, mode) => {
    const words = topic ? getWordsForTopic(level, topic) : getWordsForLevel(level);
    const sh = shuffle(words).slice(0, 15);
    setSessionWords(sh); setCurrentIndex(0); setShowTranslation(false);
    setSessionResults([]); setQuizAnswer(null); setExerciseMode(mode); setSelectedTopic(topic);
    if (mode === "match") {
      const mw = sh.slice(0, 6);
      setMatchPairs([...shuffle(mw.map((w,i) => ({ id:`gr-${i}`, text:w.gr, pairId:i, type:"gr" }))), ...shuffle(mw.map((w,i) => ({ id:`ru-${i}`, text:w.ru, pairId:i, type:"ru" })))]);
      setMatchSelected([]); setMatchMatched(new Set()); setMatchErrors(0);
      navigateTo("match");

      const c = sh[0]; const o = shuffle(sh.filter(w => w.gr !== c.gr)).slice(0, 3);
      setQuizOptions(shuffle([c, ...o])); navigateTo("quiz");
    } else { navigateTo("flashcards"); }
  };

    const key = getCardKey(word);
    const cur = cardStates[key] || getInitialCardState();
    setCardStates(p => ({ ...p, [key]: updateCardState(cur, q) }));
    setSessionResults(p => [...p, { word, quality: q }]);
  };

    if (currentIndex + 1 >= sessionWords.length) { navigateTo("results"); return; }
    const ni = currentIndex + 1;

          </p>
          <div style={{
            background: C.surface, borderRadius: 24, padding: "32px 28px", maxWidth: 360, width: "100%",
            boxShadow: shadow.lg, textAlign: "center",
          }}>
            <div style={{ width: 52, height: 52, borderRadius: 16, background: C.accentGlow, display: "inline-flex", alignItems: "center", justifyContent: "center", marginBottom: 16 }}>
              <span style={{ fontSize: 24 }}>🎯</span>
            </div>
            <h3 style={{ fontSize: 18, fontWeight: 700, margin: "0 0 8px", color: C.text }}>Определим твой уровень</h3>
            <p style={{ color: C.textMuted, fontSize: 13, margin: "0 0 28px", lineHeight: 1.6 }}>

            background: C.primary, border: "none", color: C.white, fontSize: 15, fontWeight: 700, cursor: "pointer", boxShadow: shadow.md,
          }}>Начать с {rec}</button>
          <button onClick={() => finishOnboarding(rec === "A2" ? "B1" : "A2")} style={{
            maxWidth: 340, width: "100%", padding: "14px", marginTop: 8, borderRadius: 12,
            background: "transparent", border: "none", color: C.textMuted, fontSize: 13, cursor: "pointer",
          }}>Выбрать {rec === "A2" ? "B1" : "A2"}</button>
        </div>
      );
    }

    // Active quiz
    const onbCur = onbWords[onbIndex];
    return wrap(
      <div style={{ padding: "24px 20px", maxWidth: 480, margin: "0 auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <span style={{ fontSize: 13, color: C.textMuted, fontWeight: 600 }}>{onbIndex + 1}/{onbWords.length}</span>
          <div style={{
            padding: "6px 16px", borderRadius: 20, fontSize: 16, fontWeight: 800,
            background: onbTimeLeft <= 10 ? C.dangerBg : C.surface,
            color: onbTimeLeft <= 10 ? C.danger : C.primary, boxShadow: shadow.sm,
          }}>{onbTimeLeft}с</div>
          <span style={{ fontSize: 13, color: C.success, fontWeight: 700 }}>{onbCorrect} ✓</span>
        </div>
        <ProgressBar value={60 - onbTimeLeft} max={60} color={onbTimeLeft <= 10 ? C.danger : C.teal} />
        <div style={{ textAlign: "center", margin: "56px 0 44px" }}>
          <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 16, letterSpacing: 1.5, textTransform: "uppercase", fontWeight: 600 }}>Как переводится?</div>
          <div style={{ fontSize: 40, fontWeight: 800, color: C.primary }}>{onbCur.gr}</div>
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {onbOptions.map((opt, i) => {
            const isCorrect = opt.gr === onbCur.gr;
            const isSel = onbAnswer === opt.gr;
            const show = onbAnswer !== null;
            let bg = C.surface, bc = "transparent", tc = C.text;
            if (show && isCorrect) { bg = C.successBg; bc = C.success; tc = C.success; }
            if (show && isSel && !isCorrect) { bg = C.dangerBg; bc = C.danger; tc = C.danger; }
            return (
              <button key={i} onClick={() => handleOnbAnswer(opt)} style={{
                padding: "17px 22px", borderRadius: 16, background: bg,
                border: `2px solid ${bc}`, color: tc, fontSize: 16, fontWeight: 600,
                cursor: onbAnswer !== null ? "default" : "pointer", textAlign: "left",
                boxShadow: show ? "none" : shadow.sm, transition: "all 0.2s",
              }}>{opt.ru}</button>
            );
          })}
        </div>
      </div>
    );
  }

  // ========== WORD LIST ==========
  if (screen === "wordlist") {
    const words = getWordsByStatus(wordListFilter);
    const stats = getStats();
    const filters = [
      { key: "all", label: "Все", count: stats.total, color: C.primary },
      { key: "learned", label: "Выучено", count: stats.learned, color: C.success },
      { key: "reviewing", label: "Повторение", count: stats.reviewing, color: C.warning },
      { key: "new", label: "Новые", count: stats.new, color: C.textMuted },
    ];
    return wrap(
      <div style={{ padding: "20px", maxWidth: 480, margin: "0 auto" }}>
        <button onClick={goHome} style={{ background: "none", border: "none", color: C.textMuted, cursor: "pointer", fontSize: 13, fontWeight: 600, padding: "8px 0", marginBottom: 8 }}>← Назад</button>
        <h2 style={{ fontSize: 22, fontWeight: 800, margin: "0 0 18px", color: C.primary }}>Мои слова</h2>
        <div style={{ display: "flex", gap: 6, marginBottom: 20, flexWrap: "wrap" }}>
          {filters.map(f => (
            <button key={f.key} onClick={() => setWordListFilter(f.key)} style={{
              padding: "7px 14px", borderRadius: 10, fontSize: 12, fontWeight: 700,
              background: wordListFilter === f.key ? f.color : C.surface,
              border: "none", color: wordListFilter === f.key ? C.white : C.textMuted,
              cursor: "pointer", boxShadow: wordListFilter === f.key ? shadow.sm : "none",
              transition: "all 0.15s",
            }}>{f.label} · {f.count}</button>
          ))}
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
          {words.length === 0 && <div style={{ textAlign: "center", padding: "48px 0", color: C.textMuted, fontSize: 14 }}>Пусто — начни тренировку!</div>}
          {words.map((w, i) => {
            const s = cardStates[`${w.level}:${w.gr}`];
            const st = !s ? "new" : s.repetitions >= 3 ? "learned" : "reviewing";
            const sc = st === "learned" ? C.success : st === "reviewing" ? C.warning : "#d4d0c8";
            return (
              <div key={`${w.level}-${w.gr}-${i}`} style={{
                padding: "12px 16px", borderRadius: 12, background: C.surface,
                display: "flex", alignItems: "center", gap: 12,
              }}>
                <div style={{ width: 8, height: 8, borderRadius: "50%", background: sc, flexShrink: 0 }} />
                <span style={{ fontWeight: 700, color: C.primary, fontSize: 15 }}>{w.gr}</span>
                <span style={{ color: "#c4c0b8" }}>·</span>
                <span style={{ color: C.textSecondary, fontSize: 14, flex: 1 }}>{w.ru}</span>
                <Badge color={C.textMuted}>{w.level}</Badge>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  // ========== HOME ==========
  if (screen === "home") {
    const stats = getStats();
    return wrap(
      <>
        {/* Header */}
        <div style={{ padding: "28px 24px 20px", position: "relative" }}>
          <div style={{ position: "absolute", top: 20, right: 20, display: "flex", gap: 2, background: C.surface, borderRadius: 10, padding: 3, boxShadow: shadow.sm }}>
            {["A2", "B1"].map(l => (
              <button key={l} onClick={() => setSelectedLevel(l)} style={{
                padding: "6px 16px", borderRadius: 8, fontSize: 12, fontWeight: 800,
                background: selectedLevel === l ? C.primary : "transparent",
                border: "none", color: selectedLevel === l ? C.white : C.textMuted,
                cursor: "pointer", transition: "all 0.15s",
              }}>{l}</button>
            ))}
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
            <div style={{
              width: 44, height: 44, borderRadius: 14, background: C.primary,
              display: "flex", alignItems: "center", justifyContent: "center", boxShadow: shadow.md,
            }}>
              <span style={{ fontSize: 22, color: C.white, fontWeight: 800, fontFamily: "'Georgia', serif" }}>λ</span>
            </div>
            <div>
              <h1 style={{ fontSize: 20, fontWeight: 800, margin: 0, color: C.primary, letterSpacing: -0.3 }}>Lexmatheia</h1>
              <p style={{ fontSize: 11, color: C.textMuted, margin: 0, letterSpacing: 0.3 }}>Ελληνομάθεια · {selectedLevel}</p>
            </div>
          </div>
        </div>

        <div style={{ padding: "0 20px", maxWidth: 480, margin: "0 auto" }}>
          {/* Stats card */}
          <div onClick={() => navigateTo("wordlist")} style={{
            background: C.surface, borderRadius: 20, padding: "22px 24px",
            marginBottom: 24, cursor: "pointer", boxShadow: shadow.md,
            transition: "transform 0.15s, box-shadow 0.15s",
          }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 16 }}>
              {[
                { v: stats.learned, l: "Выучено", c: C.success, icon: "✓" },
                { v: stats.reviewing, l: "Повторение", c: C.warning, icon: "↻" },
                { v: stats.new, l: "Новые", c: C.textMuted, icon: "+" },
              ].map(({ v, l, c, icon }, i) => (
                <div key={l} style={{ textAlign: "center", flex: 1 }}>
                  <div style={{ fontSize: 26, fontWeight: 800, color: c }}>{v}</div>
                  <div style={{ fontSize: 10, color: C.textMuted, marginTop: 2, fontWeight: 600, letterSpacing: 0.3 }}>{l}</div>
                </div>
              ))}
            </div>
            <ProgressBar value={stats.learned} max={stats.total} color={C.success} />
            <div style={{ display: "flex", justifyContent: "space-between", marginTop: 10 }}>
              <span style={{ fontSize: 11, color: C.textMuted }}>{stats.learned} из {stats.total}</span>
              <span style={{ fontSize: 11, color: C.accent, fontWeight: 700 }}>Все слова →</span>
            </div>
          </div>

          {/* Training modes */}
          <h3 style={{ fontSize: 11, fontWeight: 800, color: C.textMuted, marginBottom: 12, letterSpacing: 1.5, textTransform: "uppercase" }}>Тренировка</h3>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, marginBottom: 32 }}>
            {[
              { mode: "flashcards", icon: "🃏", label: "Карточки", color: C.primary },
              { mode: "quiz", icon: "✅", label: "Тест", color: C.teal },
              { mode: "match", icon: "🔗", label: "Пары", color: C.accent },
            ].map(({ mode, icon, label, color }) => (
              <button key={mode} onClick={() => startSession(selectedLevel, null, mode)} style={{
                padding: "24px 10px 18px", borderRadius: 18, border: "none",
                background: C.surface, color: C.text, cursor: "pointer",
                textAlign: "center", boxShadow: shadow.sm,
                transition: "all 0.15s",
              }}>
                <div style={{ fontSize: 28, marginBottom: 10 }}>{icon}</div>
                <div style={{ fontSize: 13, fontWeight: 700, color }}>{label}</div>
              </button>
            ))}
          </div>

          {/* Topics */}
          <h3 style={{ fontSize: 11, fontWeight: 800, color: C.textMuted, marginBottom: 12, letterSpacing: 1.5, textTransform: "uppercase" }}>Темы</h3>
          <div style={{ display: "flex", flexDirection: "column", gap: 8, paddingBottom: 40 }}>
            {Object.entries(WORD_DATABASE[selectedLevel] || {}).map(([topic, words]) => {
              const learned = words.filter(w => { const s = cardStates[`${selectedLevel}:${w.gr}`]; return s && s.repetitions >= 3; }).length;
              const pct = words.length > 0 ? Math.round((learned / words.length) * 100) : 0;
              return (
                <button key={topic} onClick={() => { setSelectedTopic(topic); navigateTo("topics"); }} style={{
                  padding: "16px 18px", borderRadius: 16, border: "none",
                  background: C.surface, color: C.text, cursor: "pointer",
                  display: "flex", alignItems: "center", gap: 14, textAlign: "left",
                  boxShadow: shadow.sm, transition: "all 0.15s",
                }}>
                  <div style={{
                    width: 44, height: 44, borderRadius: 14, background: C.primaryGlow,
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: 20, flexShrink: 0,
                  }}>{TOPIC_ICONS[topic] || "📖"}</div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 14, fontWeight: 700, color: C.text }}>{TOPIC_RU[topic] || topic}</div>
                    <div style={{ fontSize: 11, color: C.textMuted, marginTop: 3 }}>{words.length} слов · {learned} выучено</div>
                  </div>
                  <div style={{ textAlign: "right", minWidth: 36 }}>
                    <div style={{ fontSize: 13, fontWeight: 800, color: pct > 0 ? C.teal : C.textMuted }}>{pct}%</div>
                  </div>
                </button>
              );
            })}
          </div>
        </div>
      </>
    );
  }

  // ========== TOPIC DETAIL ==========
  if (screen === "topics") {
    const words = getWordsForTopic(selectedLevel, selectedTopic);
    return wrap(
      <div style={{ padding: "20px", maxWidth: 480, margin: "0 auto" }}>
        <button onClick={goHome} style={{ background: "none", border: "none", color: C.textMuted, cursor: "pointer", fontSize: 13, fontWeight: 600, padding: "8px 0", marginBottom: 8 }}>← Назад</button>
        <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 20 }}>
          <div style={{ width: 48, height: 48, borderRadius: 16, background: C.primaryGlow, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24 }}>
            {TOPIC_ICONS[selectedTopic] || "📖"}
          </div>
          <div>
            <h2 style={{ fontSize: 20, fontWeight: 800, margin: 0, color: C.primary }}>{TOPIC_RU[selectedTopic] || selectedTopic}</h2>
            <p style={{ fontSize: 12, color: C.textMuted, margin: "2px 0 0" }}>{words.length} слов · {selectedLevel}</p>
          </div>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 28 }}>
          {["flashcards", "quiz", "match"].map(m => (
            <button key={m} onClick={() => startSession(selectedLevel, selectedTopic, m)} style={{
              padding: "14px 8px", borderRadius: 14, border: "none",
              background: C.surface, color: C.text, cursor: "pointer",
              fontSize: 12, fontWeight: 700, boxShadow: shadow.sm,
            }}>{{ flashcards: "🃏 Карточки", quiz: "✅ Тест", match: "🔗 Пары" }[m]}</button>
          ))}
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
          {words.map((w, i) => {
            const s = cardStates[`${w.level}:${w.gr}`];
            const st = !s ? "#d4d0c8" : s.repetitions >= 3 ? C.success : C.warning;
            return (
              <div key={i} style={{ padding: "12px 16px", borderRadius: 12, background: C.surface, display: "flex", alignItems: "center", gap: 10 }}>
                <div style={{ width: 7, height: 7, borderRadius: "50%", background: st }} />
                <span style={{ fontWeight: 700, color: C.primary, fontSize: 15 }}>{w.gr}</span>
                <span style={{ color: "#d4d0c8" }}>·</span>
                <span style={{ color: C.textSecondary, fontSize: 14, flex: 1 }}>{w.ru}</span>
                <span style={{ fontSize: 11, color: C.textMuted }}>{w.en}</span>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  // ========== FLASHCARDS ==========
  if (screen === "flashcards" && currentWord) {
    return wrap(
      <div style={{ padding: "20px", maxWidth: 480, margin: "0 auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <IconBtn onClick={goHome}>✕</IconBtn>
          <Badge color={C.primary}>{selectedLevel} · Карточки</Badge>
          <span style={{ fontSize: 13, color: C.textMuted, fontWeight: 700, minWidth: 40, textAlign: "right" }}>{currentIndex + 1}/{sessionWords.length}</span>
        </div>
        <ProgressBar value={currentIndex + 1} max={sessionWords.length} />

        <div onClick={() => setShowTranslation(!showTranslation)} style={{
          marginTop: 36, padding: "56px 32px", borderRadius: 24,
          background: C.surface, cursor: "pointer", textAlign: "center",
          minHeight: 240, display: "flex", flexDirection: "column",
          justifyContent: "center", alignItems: "center",
          boxShadow: shadow.xl, transition: "transform 0.2s",
        }}>
          {!showTranslation ? (
            <>
              <div style={{ fontSize: 40, fontWeight: 800, color: C.primary, marginBottom: 16, lineHeight: 1.1 }}>{currentWord.gr}</div>
              <div style={{ fontSize: 13, color: C.textMuted, fontWeight: 500 }}>Нажми, чтобы перевернуть</div>
            </>
          ) : (
            <>
              <div style={{ fontSize: 30, fontWeight: 800, color: C.primary, marginBottom: 12 }}>{currentWord.gr}</div>
              <div style={{ width: 32, height: 2, background: C.border, margin: "0 0 16px", borderRadius: 1 }} />
              <div style={{ fontSize: 24, fontWeight: 700, color: C.text, marginBottom: 6 }}>{currentWord.ru}</div>
              <div style={{ fontSize: 14, color: C.textMuted, marginBottom: 20 }}>{currentWord.en}</div>
              <div style={{
                fontSize: 13, color: C.textSecondary, fontStyle: "italic",
                padding: "12px 18px", background: C.bg, borderRadius: 12,
                maxWidth: 300, lineHeight: 1.5,
              }}>{currentWord.example}</div>
            </>
          )}
        </div>

        {showTranslation && (
          <div style={{ display: "flex", gap: 8, marginTop: 28 }}>
            {[
              { q: 0, label: "Не знаю", color: C.danger, bg: C.dangerBg },
              { q: 3, label: "Трудно", color: C.warning, bg: C.warningBg },
              { q: 4, label: "Знаю", color: C.teal, bg: C.tealGlow },
              { q: 5, label: "Легко", color: C.success, bg: C.successBg },
            ].map(({ q, label, color, bg }) => (
              <button key={q} onClick={() => { rateCard(currentWord, q); nextCard(); }} style={{
                flex: 1, padding: "15px 6px", borderRadius: 14, background: bg,
                border: "none", color, fontSize: 13, fontWeight: 700,
                cursor: "pointer", transition: "transform 0.1s",
              }}>{label}</button>
            ))}
          </div>
        )}
      </div>
    );
  }

  // ========== QUIZ ==========
  if (screen === "quiz" && currentWord) {
    return wrap(
      <div style={{ padding: "20px", maxWidth: 480, margin: "0 auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <IconBtn onClick={goHome}>✕</IconBtn>
          <Badge color={C.teal}>{selectedLevel} · Тест</Badge>
          <span style={{ fontSize: 13, color: C.textMuted, fontWeight: 700, minWidth: 40, textAlign: "right" }}>{currentIndex + 1}/{sessionWords.length}</span>
        </div>
        <ProgressBar value={currentIndex + 1} max={sessionWords.length} color={C.teal} />
        <div style={{ textAlign: "center", margin: "52px 0 44px" }}>
          <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 16, letterSpacing: 1.5, textTransform: "uppercase", fontWeight: 700 }}>Как переводится?</div>
          <div style={{ fontSize: 38, fontWeight: 800, color: C.primary }}>{currentWord.gr}</div>
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {quizOptions.map((opt, i) => {
            const isC = opt.gr === currentWord.gr;
            const isS = quizAnswer === i;
            const show = quizAnswer !== null;
            let bg = C.surface, bc = "transparent", tc = C.text;
            if (show && isC) { bg = C.successBg; bc = C.success; tc = C.success; }
            if (show && isS && !isC) { bg = C.dangerBg; bc = C.danger; tc = C.danger; }
            return (
              <button key={i} onClick={() => {
                if (quizAnswer !== null) return;
                setQuizAnswer(i); rateCard(currentWord, isC ? 4 : 0);
                setTimeout(nextCard, 1000);
              }} style={{
                padding: "17px 22px", borderRadius: 16, background: bg,
                border: `2px solid ${bc}`, color: tc, fontSize: 16, fontWeight: 600,
                cursor: quizAnswer !== null ? "default" : "pointer", textAlign: "left",
                boxShadow: show ? "none" : shadow.sm, transition: "all 0.2s",
              }}>{opt.ru}</button>
            );
          })}
        </div>
      </div>
    );
  }

  // ========== MATCH ==========
  if (screen === "match") {
    const grItems = matchPairs.filter(p => p.type === "gr");
    const ruItems = matchPairs.filter(p => p.type === "ru");
    const totalP = grItems.length;
    const matchedC = matchMatched.size / 2;

    const handleMatch = (item) => {
      if (matchMatched.has(item.pairId + "-" + item.type)) return;
      if (matchSelected.length === 0) setMatchSelected([item]);
      else if (matchSelected.length === 1) {
        const f = matchSelected[0];
        if (f.id === item.id) { setMatchSelected([]); return; }
        if (f.type === item.type) { setMatchSelected([item]); return; }
        if (f.pairId === item.pairId) {
          const nm = new Set([...matchMatched, f.pairId+"-"+f.type, item.pairId+"-"+item.type]);
          setMatchMatched(nm); setMatchSelected([]);
          const mw = sessionWords.find(w => w.gr === (f.type === "gr" ? f.text : item.text));
          if (mw) rateCard(mw, 4);
          if (nm.size / 2 >= totalP) setTimeout(() => navigateTo("results"), 700);
        } else {
          setMatchErrors(p => p + 1); setMatchSelected([f, item]);
          const mw = sessionWords.find(w => w.gr === (f.type === "gr" ? f.text : item.text));
          if (mw) rateCard(mw, 0);
          setTimeout(() => setMatchSelected([]), 500);
        }
      }
    };

    return wrap(
      <div style={{ padding: "20px", maxWidth: 480, margin: "0 auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <IconBtn onClick={goHome}>✕</IconBtn>
          <Badge color={C.accent}>{selectedLevel} · Пары</Badge>
          <span style={{ fontSize: 13, color: C.textMuted, fontWeight: 700 }}>{matchedC}/{totalP}</span>
        </div>
        <ProgressBar value={matchedC} max={totalP} color={C.accent} />
        <div style={{ fontSize: 13, color: C.textSecondary, textAlign: "center", margin: "14px 0 22px", fontWeight: 500 }}>
          Соедини слово с переводом
          {matchErrors > 0 && <span style={{ color: C.danger, marginLeft: 8, fontWeight: 700 }}>· {matchErrors} ош.</span>}
        </div>
        <div style={{ display: "flex", gap: 10 }}>
          {[grItems, ruItems].map((items, col) => (
            <div key={col} style={{ flex: 1, display: "flex", flexDirection: "column", gap: 8 }}>
              {items.map(item => {
                const isMtch = matchMatched.has(item.pairId + "-" + item.type);
                const isSel = matchSelected.some(s => s.id === item.id);
                const isWrong = matchSelected.length === 2 && isSel && matchSelected[0].pairId !== matchSelected[1].pairId;
                let bg = C.surface, bc = "transparent", tc = col === 0 ? C.primary : C.text;
                if (isMtch) { bg = C.successBg; bc = C.success; tc = C.success; }
                else if (isWrong) { bg = C.dangerBg; bc = C.danger; }
                else if (isSel) { bg = C.primaryGlow; bc = C.primary; }
                return (
                  <button key={item.id} onClick={() => handleMatch(item)} style={{
                    padding: "15px 12px", borderRadius: 14, fontSize: col === 0 ? 15 : 14,
                    fontWeight: col === 0 ? 700 : 600, background: bg,
                    border: `2px solid ${bc}`, color: tc,
                    cursor: isMtch ? "default" : "pointer",
                    opacity: isMtch ? 0.45 : 1,
                    transform: isSel && !isMtch ? "scale(1.03)" : "scale(1)",
                    transition: "all 0.15s", boxShadow: isSel ? shadow.sm : "none",
                  }}>{item.text}</button>
                );
              })}
            </div>
          ))}
        </div>
      </div>
    );
  }

  // ========== RESULTS ==========
  if (screen === "results") {
    const correct = sessionResults.filter(r => r.quality >= 3).length;
    const total = sessionResults.length || 1;
    const pct = Math.round((correct / total) * 100);

    return wrap(
      <div style={{ padding: "44px 20px", maxWidth: 480, margin: "0 auto", textAlign: "center" }}>
        <div style={{
          width: 80, height: 80, borderRadius: 24, background: pct >= 70 ? C.successBg : pct >= 40 ? C.warningBg : C.dangerBg,
          display: "inline-flex", alignItems: "center", justifyContent: "center", marginBottom: 20,
        }}>
          <span style={{ fontSize: 40 }}>{pct >= 80 ? "🎉" : pct >= 50 ? "💪" : "📚"}</span>
        </div>
        <h2 style={{ fontSize: 24, fontWeight: 800, margin: "0 0 6px", color: C.primary }}>
          {pct >= 80 ? "Μπράβο!" : pct >= 50 ? "Καλή δουλειά!" : "Συνέχισε!"}
        </h2>
        <p style={{ color: C.textMuted, fontSize: 14, margin: "0 0 32px", fontWeight: 500 }}>
          {pct >= 80 ? "Отличный результат!" : pct >= 50 ? "Хорошо, продолжай!" : "Повтори для закрепления"}
        </p>

        <div style={{
          display: "inline-flex", alignItems: "center", justifyContent: "center",
          width: 130, height: 130, borderRadius: "50%",
          background: `conic-gradient(${pct >= 70 ? C.success : pct >= 40 ? C.warning : C.danger} ${pct}%, ${C.border} 0%)`,
          marginBottom: 32,
        }}>
          <div style={{
            width: 108, height: 108, borderRadius: "50%", background: C.bg,
            display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column",
          }}>
            <div style={{ fontSize: 32, fontWeight: 800, color: C.primary }}>{pct}%</div>
            <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 600 }}>{correct}/{total}</div>
          </div>
        </div>

        <div style={{ display: "flex", gap: 12, marginBottom: 32 }}>
          <div style={{ flex: 1, padding: "16px", background: C.surface, borderRadius: 16, boxShadow: shadow.sm }}>
            <div style={{ fontSize: 24, fontWeight: 800, color: C.success }}>{correct}</div>
            <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 600 }}>Правильно</div>
          </div>
          <div style={{ flex: 1, padding: "16px", background: C.surface, borderRadius: 16, boxShadow: shadow.sm }}>
            <div style={{ fontSize: 24, fontWeight: 800, color: C.danger }}>{total - correct}</div>
            <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 600 }}>Ошибки</div>
          </div>
        </div>

        {sessionResults.length > 0 && (
          <div style={{ textAlign: "left", marginBottom: 28 }}>
            <h3 style={{ fontSize: 11, fontWeight: 800, color: C.textMuted, marginBottom: 8, letterSpacing: 1.5, textTransform: "uppercase" }}>Результаты</h3>
            {sessionResults.map((r, i) => (
              <div key={i} style={{
                padding: "11px 16px", borderRadius: 10, marginBottom: 3, background: C.surface,
                display: "flex", justifyContent: "space-between", alignItems: "center",
                borderLeft: `3px solid ${r.quality >= 3 ? C.success : C.danger}`,
              }}>
                <span style={{ fontWeight: 700, color: C.primary, fontSize: 14 }}>{r.word.gr}</span>
                <span style={{ color: C.textSecondary, fontSize: 13 }}>{r.word.ru}</span>
              </div>
            ))}
          </div>
        )}

        <div style={{ display: "flex", gap: 10 }}>
          <button onClick={goHome} style={{
            flex: 1, padding: "15px", borderRadius: 14, background: C.surface,
            border: "none", color: C.text, fontSize: 14, fontWeight: 700,
            cursor: "pointer", boxShadow: shadow.sm,
          }}>На главную</button>
          <button onClick={() => startSession(selectedLevel, selectedTopic, exerciseMode)} style={{
            flex: 1, padding: "15px", borderRadius: 14, background: C.primary,
            border: "none", color: C.white, fontSize: 14, fontWeight: 700,
            cursor: "pointer", boxShadow: shadow.md,
          }}>Ещё раз</button>
        </div>
      </div>
    );
  }

  return wrap(
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
      <button onClick={goHome} style={{ padding: "16px 32px", borderRadius: 14, background: C.primary, border: "none", color: C.white, fontSize: 16, fontWeight: 700, cursor: "pointer" }}>На главную</button>
    </div>
  );
}

        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
