  },
  "Существительные ср. р.": {
    desc: "Основные окончания среднего рода.",
    headers: ["Тип", "Им. ед.", "Род. ед.", "Им. мн.", "Род. мн."],
    rows: [
      ["-ο", "-ο", "-ου", "-α", "-ων"],
      ["-ι", "-ι", "-ιού", "-ιά", "-ιών"],
      ["-μα", "-μα", "-ματος", "-ματα", "-μάτων"],
    ]
  },
  "Числительные 1-20": {
    desc: "Базовые числа.",
    headers: ["Число", "Греческий", "Число", "Греческий"],
    rows: [
      ["1", "ένα", "11", "έντεκα"],
      ["2", "δύο", "12", "δώδεκα"],
      ["3", "τρία", "13", "δεκατρία"],
      ["4", "τέσσερα", "14", "δεκατέσσερα"],
      ["5", "πέντε", "15", "δεκαπέντε"],
      ["6", "έξι", "16", "δεκαέξι"],
      ["7", "εφτά", "17", "δεκαεφτά"],
      ["8", "οχτώ", "18", "δεκαοχτώ"],
      ["9", "εννιά", "19", "δεκαεννιά"],
      ["10", "δέκα", "20", "είκοσι"],
    ]
  },
};

// --- Colors ---
const font = "'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif";
const C = {
  bg: "#f7f5f0", surface: "#ffffff", surfaceHover: "#faf9f6", card: "#ffffff",
  border: "#e8e4dc", borderLight: "#f0ede6",
  primary: "#1a3a5c", primaryLight: "#2d5f8a", primaryGlow: "rgba(26,58,92,0.08)",
  accent: "#c4763a", accentLight: "#d4945e", accentGlow: "rgba(196,118,58,0.1)",
  teal: "#2a9d8f", tealLight: "#40b4a6", tealGlow: "rgba(42,157,143,0.08)",
  success: "#2a9d8f", successBg: "rgba(42,157,143,0.08)",
  warning: "#e9a820", warningBg: "rgba(233,168,32,0.08)",
  danger: "#c1453b", dangerBg: "rgba(193,69,59,0.08)",
  text: "#1a1a1a", textSecondary: "#5a5a52", textMuted: "#9a9a90", white: "#ffffff",
};
const shadow = { sm: "0 1px 3px rgba(0,0,0,0.04)", md: "0 4px 12px rgba(0,0,0,0.06)", lg: "0 8px 30px rgba(0,0,0,0.08)", xl: "0 16px 50px rgba(0,0,0,0.1)" };

// --- Shared Components ---
const ProgressBar = ({ value, max, color = C.teal, height = 5 }) => (
  <div style={{ width: "100%", height, borderRadius: height, background: `${color}15`, overflow: "hidden" }}>
    <div style={{ width: `${Math.min(100, (value / max) * 100)}%`, height: "100%", background: color, borderRadius: height, transition: "width 0.5s ease" }} />
  </div>
);
const Badge = ({ children, color = C.primary }) => (
  <span style={{ display: "inline-block", padding: "4px 12px", borderRadius: 8, fontSize: 11, fontWeight: 700, letterSpacing: 0.8, textTransform: "uppercase", background: `${color}10`, color }}>{children}</span>
);
const IconBtn = ({ onClick, children }) => (
  <button onClick={onClick} style={{ background: "none", border: "none", cursor: "pointer", width: 40, height: 40, borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center", color: C.textMuted, fontSize: 18 }}>{children}</button>
);

// --- Storage helpers ---
const saveUserData = async (username, cardStates) => {
  try {
    localStorage.setItem(`lexmatheia:${username}`, JSON.stringify(cardStates));
  } catch(e) { console.error("Save failed", e); }
};
const loadUserData = async (username) => {
  try {
    const data = localStorage.getItem(`lexmatheia:${username}`);
    return data ? JSON.parse(data) : {};
  } catch(e) { console.error("Load failed", e); }
  return {};
};

// --- Speech Recognition ---
const hasSpeechRecognition = typeof window !== 'undefined' && ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window);

function App() {
  const [screen, setScreen] = useState("userselect");
  const [username, setUsername] = useState("");
  const [usernameInput, setUsernameInput] = useState("");
  const [cardStates, setCardStates] = useState({});
  const [selectedTopic, setSelectedTopic] = useState(null);
  const [sessionWords, setSessionWords] = useState([]);
  const [currentIndex, setCurrentIndex] = useState(0);
  const [showTranslation, setShowTranslation] = useState(false);
  const [quizOptions, setQuizOptions] = useState([]);
  const [quizAnswer, setQuizAnswer] = useState(null);
  const [sessionResults, setSessionResults] = useState([]);
  const [matchPairs, setMatchPairs] = useState([]);
  const [matchSelected, setMatchSelected] = useState([]);
  const [matchMatched, setMatchMatched] = useState(new Set());
  const [matchErrors, setMatchErrors] = useState(0);
  const [exerciseMode, setExerciseMode] = useState("flashcards");
  const [wordListFilter, setWordListFilter] = useState("all");
  const [fadeIn, setFadeIn] = useState(true);
  const [grammarTopic, setGrammarTopic] = useState(null);
  // Speech
  const [isListening, setIsListening] = useState(false);
  const [speechResult, setSpeechResult] = useState(null);
  const [speechScore, setSpeechScore] = useState(null);
  const recognitionRef = useRef(null);
  const saveTimerRef = useRef(null);

  const getAllWords = useCallback(() => {
    return Object.entries(WORD_DATABASE).flatMap(([topic, words]) => words.map(w => ({ ...w, topic })));
  }, []);
  const getWordsForTopic = useCallback((topic) => {
    return (WORD_DATABASE[topic] || []).map(w => ({ ...w, topic }));
  }, []);
  const getCardKey = (w) => w.gr;

  const getStats = useCallback(() => {
    const all = getAllWords();
    let learned = 0, reviewing = 0, newW = 0;
    all.forEach(w => { const s = cardStates[w.gr]; if (!s) newW++; else if (s.repetitions >= 3) learned++; else reviewing++; });
    return { total: all.length, learned, reviewing, new: newW };
  }, [cardStates, getAllWords]);

  const getWordsByStatus = useCallback((f) => {
    return getAllWords().filter(w => {
      const s = cardStates[w.gr];
      if (f === "all") return true;
      if (f === "new") return !s;
      if (f === "learned") return s && s.repetitions >= 3;
      if (f === "reviewing") return s && s.repetitions > 0 && s.repetitions < 3;
      return true;
    });
  }, [cardStates, getAllWords]);

  // Auto-save on cardStates change
  useEffect(() => {
    if (!username) return;
    if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
    saveTimerRef.current = setTimeout(() => { saveUserData(username, cardStates); }, 500);
  }, [cardStates, username]);

  const navigateTo = (s) => { setFadeIn(false); setTimeout(() => { setScreen(s); setFadeIn(true); }, 100); };

  // Login
  const loginUser = async (name) => {
    if (!name.trim()) return;
    const n = name.trim();
    setUsername(n);
    const data = await loadUserData(n);
    setCardStates(data || {});
    navigateTo("home");
  };

  const startSession = (topic, mode) => {
    const words = topic ? getWordsForTopic(topic) : getAllWords();
    const sh = shuffle(words).slice(0, 15);
    setSessionWords(sh); setCurrentIndex(0); setShowTranslation(false);
    setSessionResults([]); setQuizAnswer(null); setExerciseMode(mode); setSelectedTopic(topic);
    if (mode === "match") {
      const mw = sh.slice(0, 6);
      setMatchPairs([...shuffle(mw.map((w,i) => ({ id:`gr-${i}`, text:w.gr, pairId:i, type:"gr" }))), ...shuffle(mw.map((w,i) => ({ id:`ru-${i}`, text:w.ru, pairId:i, type:"ru" })))]);
      setMatchSelected([]); setMatchMatched(new Set()); setMatchErrors(0);
      navigateTo("match");
    } else if (mode === "quiz") {
      const c = sh[0]; const o = shuffle(sh.filter(w => w.gr !== c.gr)).slice(0, 3);
      setQuizOptions(shuffle([c, ...o])); navigateTo("quiz");
    } else if (mode === "speak") {
      navigateTo("speak");
    } else { navigateTo("flashcards"); }
  };

  const rateCard = (word, q) => {
    const key = getCardKey(word);
    const cur = cardStates[key] || getInitialCardState();
    setCardStates(p => ({ ...p, [key]: updateCardState(cur, q) }));
    setSessionResults(p => [...p, { word, quality: q }]);
  };

  const nextCard = () => {
    if (currentIndex + 1 >= sessionWords.length) { navigateTo("results"); return; }
    const ni = currentIndex + 1;
    setCurrentIndex(ni); setShowTranslation(false); setQuizAnswer(null);
    setSpeechResult(null); setSpeechScore(null);
    if (exerciseMode === "quiz") {
      const c = sessionWords[ni]; const o = shuffle(sessionWords.filter(w => w.gr !== c.gr)).slice(0, 3);
      setQuizOptions(shuffle([c, ...o]));
    }
  };

  const goHome = () => { setSelectedTopic(null); navigateTo("home"); };
  const currentWord = sessionWords[currentIndex];

  // --- Speech Recognition ---
  const startListening = (targetWord) => {
    if (!hasSpeechRecognition) return;
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SR();
    recognition.lang = 'el-GR';
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.maxAlternatives = 5;
    
    recognition.onstart = () => setIsListening(true);
    recognition.onend = () => setIsListening(false);
    recognition.onerror = () => { setIsListening(false); setSpeechResult("error"); };
    recognition.onresult = (event) => {
      const results = [];
      for (let i = 0; i < event.results[0].length; i++) {
        results.push(event.results[0][i].transcript.toLowerCase().trim());
      }
      setSpeechResult(results[0]);
      const target = targetWord.toLowerCase().trim();
      const match = results.some(r => r === target || r.includes(target) || target.includes(r));
      const partial = results.some(r => {
        const common = [...r].filter((c, i) => target[i] === c).length;
        return common / Math.max(r.length, target.length) > 0.6;
      });
      setSpeechScore(match ? "correct" : partial ? "close" : "wrong");
      rateCard({ gr: targetWord, topic: "" }, match ? 5 : partial ? 3 : 0);
    };
    
    recognitionRef.current = recognition;
    setSpeechResult(null);
    setSpeechScore(null);
    recognition.start();
  };

  const wrap = (ch) => (
    <div style={{ minHeight: "100vh", background: C.bg, color: C.text, fontFamily: font, opacity: fadeIn ? 1 : 0, transition: "opacity 0.1s ease", WebkitFontSmoothing: "antialiased" }}>{ch}</div>
  );

  // ============ USER SELECT ============
  if (screen === "userselect") {
    return wrap(
      <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 28 }}>
        <div style={{ width: 72, height: 72, borderRadius: 20, background: C.primary, display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 20, boxShadow: shadow.lg }}>
          <span style={{ fontSize: 36, color: C.white, fontWeight: 800, fontFamily: "Georgia, serif" }}>λ</span>
        </div>
        <h1 style={{ fontSize: 28, fontWeight: 800, margin: "0 0 6px", color: C.primary }}>Lexmatheia</h1>
        <p style={{ color: C.textSecondary, fontSize: 14, margin: "0 0 36px", textAlign: "center" }}>Греческая лексика для Ελληνομάθεια</p>
        
        <div style={{ background: C.surface, borderRadius: 24, padding: "28px 24px", maxWidth: 360, width: "100%", boxShadow: shadow.lg, textAlign: "center" }}>
          <div style={{ fontSize: 24, marginBottom: 12 }}>👤</div>
          <h3 style={{ fontSize: 17, fontWeight: 700, margin: "0 0 6px" }}>Введи своё имя</h3>
          <p style={{ color: C.textMuted, fontSize: 12, margin: "0 0 20px", lineHeight: 1.5 }}>Прогресс сохранится и будет доступен с любого устройства</p>
          <input
            value={usernameInput}
            onChange={e => setUsernameInput(e.target.value)}
            onKeyDown={e => { if (e.key === "Enter") loginUser(usernameInput); }}
            placeholder="Имя или ник..."
            style={{ width: "100%", padding: "14px 18px", fontSize: 16, borderRadius: 14, border: `2px solid ${C.border}`, background: C.bg, color: C.text, outline: "none", boxSizing: "border-box", marginBottom: 14, textAlign: "center", fontFamily: font }}
          />
          <button onClick={() => loginUser(usernameInput)} disabled={!usernameInput.trim()} style={{
            width: "100%", padding: "16px", borderRadius: 14, border: "none",
            background: usernameInput.trim() ? C.primary : C.border,
            color: C.white, fontSize: 15, fontWeight: 700, cursor: usernameInput.trim() ? "pointer" : "default",
            boxShadow: usernameInput.trim() ? shadow.md : "none", transition: "all 0.15s",
          }}>Войти</button>
        </div>
      </div>
    );
  }

  // ============ HOME ============
  if (screen === "home") {
    const stats = getStats();
    return wrap(<>
      <div style={{ padding: "28px 24px 16px", position: "relative" }}>
        <div style={{ position: "absolute", top: 20, right: 20, display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 12, color: C.textMuted, fontWeight: 600 }}>👤 {username}</span>
          <button onClick={() => { setUsername(""); setCardStates({}); navigateTo("userselect"); }} style={{ background: C.surface, border: "none", borderRadius: 8, padding: "4px 10px", fontSize: 11, color: C.textMuted, cursor: "pointer", boxShadow: shadow.sm }}>Выйти</button>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
          <div style={{ width: 44, height: 44, borderRadius: 14, background: C.primary, display: "flex", alignItems: "center", justifyContent: "center", boxShadow: shadow.md }}>
            <span style={{ fontSize: 22, color: C.white, fontWeight: 800, fontFamily: "Georgia, serif" }}>λ</span>
          </div>
          <div>
            <h1 style={{ fontSize: 20, fontWeight: 800, margin: 0, color: C.primary }}>Lexmatheia</h1>
            <p style={{ fontSize: 11, color: C.textMuted, margin: 0 }}>Ελληνομάθεια · A2/B1</p>
          </div>
        </div>
      </div>
      <div style={{ padding: "0 20px", maxWidth: 480, margin: "0 auto" }}>
        {/* Stats */}
        <div onClick={() => navigateTo("wordlist")} style={{ background: C.surface, borderRadius: 20, padding: "20px 24px", marginBottom: 24, cursor: "pointer", boxShadow: shadow.md }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 14 }}>
            {[{ v: stats.learned, l: "Выучено", c: C.success }, { v: stats.reviewing, l: "Повторение", c: C.warning }, { v: stats.new, l: "Новые", c: C.textMuted }].map(({ v, l, c }) => (
              <div key={l} style={{ textAlign: "center", flex: 1 }}><div style={{ fontSize: 24, fontWeight: 800, color: c }}>{v}</div><div style={{ fontSize: 10, color: C.textMuted, fontWeight: 600 }}>{l}</div></div>
            ))}
          </div>
          <ProgressBar value={stats.learned} max={stats.total} color={C.success} />
          <div style={{ display: "flex", justifyContent: "space-between", marginTop: 8 }}>
            <span style={{ fontSize: 11, color: C.textMuted }}>{stats.learned} из {stats.total}</span>
            <span style={{ fontSize: 11, color: C.accent, fontWeight: 700 }}>Все слова →</span>
          </div>
        </div>

        {/* Training modes */}
        <h3 style={{ fontSize: 11, fontWeight: 800, color: C.textMuted, marginBottom: 10, letterSpacing: 1.5, textTransform: "uppercase" }}>Тренировка</h3>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 12 }}>
          {[
            { mode: "flashcards", icon: "🃏", label: "Карточки", color: C.primary },
            { mode: "quiz", icon: "✅", label: "Тест", color: C.teal },
            { mode: "match", icon: "🔗", label: "Пары", color: C.accent },
            ...(hasSpeechRecognition ? [{ mode: "speak", icon: "🎙", label: "Произношение", color: "#8b5cf6" }] : []),
          ].map(({ mode, icon, label, color }) => (
            <button key={mode} onClick={() => startSession(null, mode)} style={{ padding: "20px 10px", borderRadius: 16, border: "none", background: C.surface, color: C.text, cursor: "pointer", textAlign: "center", boxShadow: shadow.sm }}>
              <div style={{ fontSize: 26, marginBottom: 8 }}>{icon}</div>
              <div style={{ fontSize: 13, fontWeight: 700, color }}>{label}</div>
            </button>
          ))}
        </div>
        
        {/* Grammar button */}
        <button onClick={() => navigateTo("grammar")} style={{ width: "100%", padding: "16px", borderRadius: 16, border: "none", background: C.surface, color: C.text, cursor: "pointer", boxShadow: shadow.sm, marginBottom: 24, display: "flex", alignItems: "center", gap: 14 }}>
          <div style={{ width: 44, height: 44, borderRadius: 14, background: "rgba(139,92,246,0.08)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22 }}>📖</div>
          <div style={{ textAlign: "left" }}>
            <div style={{ fontSize: 14, fontWeight: 700 }}>Грамматика</div>
            <div style={{ fontSize: 11, color: C.textMuted }}>Таблицы склонений, спряжений, артикли</div>
          </div>
          <div style={{ marginLeft: "auto", color: C.textMuted }}>›</div>
        </button>

        {/* Topics */}
        <h3 style={{ fontSize: 11, fontWeight: 800, color: C.textMuted, marginBottom: 10, letterSpacing: 1.5, textTransform: "uppercase" }}>Темы</h3>
        <div style={{ display: "flex", flexDirection: "column", gap: 8, paddingBottom: 40 }}>
          {Object.entries(WORD_DATABASE).map(([topic, words]) => {
            const learned = words.filter(w => { const s = cardStates[w.gr]; return s && s.repetitions >= 3; }).length;
            const pct = words.length > 0 ? Math.round((learned / words.length) * 100) : 0;
            return (
              <button key={topic} onClick={() => { setSelectedTopic(topic); navigateTo("topics"); }} style={{ padding: "14px 16px", borderRadius: 16, border: "none", background: C.surface, color: C.text, cursor: "pointer", display: "flex", alignItems: "center", gap: 12, textAlign: "left", boxShadow: shadow.sm }}>
                <div style={{ width: 44, height: 44, borderRadius: 14, background: C.primaryGlow, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, flexShrink: 0 }}>{TOPIC_ICONS[topic] || "📖"}</div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 14, fontWeight: 700 }}>{topic}</div>
                  <div style={{ fontSize: 11, color: C.textMuted, marginTop: 3 }}>{words.length} слов · {learned} выучено</div>
                </div>
                <div style={{ fontSize: 13, fontWeight: 800, color: pct > 0 ? C.teal : C.textMuted }}>{pct}%</div>
              </button>
            );
          })}
        </div>
      </div>
    </>);
  }

  // ============ GRAMMAR ============
  if (screen === "grammar") {
    if (grammarTopic && GRAMMAR[grammarTopic]) {
      const g = GRAMMAR[grammarTopic];
      return wrap(
        <div style={{ padding: "20px", maxWidth: 480, margin: "0 auto" }}>
          <button onClick={() => setGrammarTopic(null)} style={{ background: "none", border: "none", color: C.textMuted, cursor: "pointer", fontSize: 13, fontWeight: 600, padding: "8px 0", marginBottom: 8 }}>← Назад</button>
          <h2 style={{ fontSize: 20, fontWeight: 800, margin: "0 0 6px", color: C.primary }}>{grammarTopic}</h2>
          <p style={{ fontSize: 13, color: C.textSecondary, margin: "0 0 20px", lineHeight: 1.5 }}>{g.desc}</p>
          <div style={{ background: C.surface, borderRadius: 16, overflow: "hidden", boxShadow: shadow.md }}>
            <div style={{ overflowX: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 14 }}>
                <thead>
                  <tr>{g.headers.map((h, i) => <th key={i} style={{ padding: "12px 14px", textAlign: "left", fontWeight: 700, fontSize: 12, color: C.primary, background: C.primaryGlow, borderBottom: `2px solid ${C.border}`, whiteSpace: "nowrap" }}>{h}</th>)}</tr>
                </thead>
                <tbody>
                  {g.rows.map((row, ri) => (
                    <tr key={ri}>
                      {row.map((cell, ci) => (
                        <td key={ci} style={{ padding: "11px 14px", borderBottom: `1px solid ${C.borderLight}`, fontWeight: ci === 0 ? 600 : 400, color: ci === 0 ? C.textSecondary : C.text, whiteSpace: "nowrap", fontSize: 14 }}>{cell}</td>
                      ))}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }
    return wrap(
      <div style={{ padding: "20px", maxWidth: 480, margin: "0 auto" }}>
        <button onClick={goHome} style={{ background: "none", border: "none", color: C.textMuted, cursor: "pointer", fontSize: 13, fontWeight: 600, padding: "8px 0", marginBottom: 8 }}>← Назад</button>
        <h2 style={{ fontSize: 22, fontWeight: 800, margin: "0 0 4px", color: C.primary }}>📖 Грамматика</h2>
        <p style={{ fontSize: 13, color: C.textMuted, margin: "0 0 20px" }}>Базовые таблицы греческого языка</p>
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {Object.keys(GRAMMAR).map(topic => (
            <button key={topic} onClick={() => setGrammarTopic(topic)} style={{ padding: "16px 18px", borderRadius: 16, border: "none", background: C.surface, cursor: "pointer", textAlign: "left", boxShadow: shadow.sm, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div>
                <div style={{ fontSize: 14, fontWeight: 700, color: C.text }}>{topic}</div>
                <div style={{ fontSize: 11, color: C.textMuted, marginTop: 2 }}>{GRAMMAR[topic].desc.slice(0, 50)}...</div>
              </div>
              <span style={{ color: C.textMuted }}>›</span>
            </button>
          ))}
        </div>
      </div>
    );
  }

  // ============ WORDLIST ============
  if (screen === "wordlist") {
    const words = getWordsByStatus(wordListFilter);
    const stats = getStats();
    const filters = [
      { key: "all", label: "Все", count: stats.total, color: C.primary },
      { key: "learned", label: "Выучено", count: stats.learned, color: C.success },
      { key: "reviewing", label: "Повтор", count: stats.reviewing, color: C.warning },
      { key: "new", label: "Новые", count: stats.new, color: C.textMuted },
    ];
    return wrap(
      <div style={{ padding: "20px", maxWidth: 480, margin: "0 auto" }}>
        <button onClick={goHome} style={{ background: "none", border: "none", color: C.textMuted, cursor: "pointer", fontSize: 13, fontWeight: 600, padding: "8px 0", marginBottom: 8 }}>← Назад</button>
        <h2 style={{ fontSize: 22, fontWeight: 800, margin: "0 0 16px", color: C.primary }}>Мои слова</h2>
        <div style={{ display: "flex", gap: 6, marginBottom: 20, flexWrap: "wrap" }}>
          {filters.map(f => (
            <button key={f.key} onClick={() => setWordListFilter(f.key)} style={{ padding: "7px 12px", borderRadius: 10, fontSize: 12, fontWeight: 700, background: wordListFilter === f.key ? f.color : C.surface, border: "none", color: wordListFilter === f.key ? C.white : C.textMuted, cursor: "pointer", boxShadow: wordListFilter === f.key ? shadow.sm : "none" }}>{f.label} · {f.count}</button>
          ))}
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
          {words.length === 0 && <div style={{ textAlign: "center", padding: 48, color: C.textMuted }}>Пусто — начни тренировку!</div>}
          {words.slice(0, 100).map((w, i) => {
            const s = cardStates[w.gr];
            const sc = !s ? "#d4d0c8" : s.repetitions >= 3 ? C.success : C.warning;
            return (
              <div key={`${w.gr}-${i}`} style={{ padding: "11px 14px", borderRadius: 10, background: C.surface, display: "flex", alignItems: "center", gap: 10 }}>
                <div style={{ width: 7, height: 7, borderRadius: "50%", background: sc, flexShrink: 0 }} />
                <span style={{ fontWeight: 700, color: C.primary, fontSize: 14 }}>{w.gr}</span>
                <span style={{ color: "#d4d0c8" }}>·</span>
                <span style={{ color: C.textSecondary, fontSize: 13, flex: 1 }}>{w.ru}</span>
              </div>
            );
          })}
          {words.length > 100 && <div style={{ textAlign: "center", padding: 16, color: C.textMuted, fontSize: 12 }}>и ещё {words.length - 100}...</div>}
        </div>
      </div>
    );
  }

  // ============ TOPIC DETAIL ============
  if (screen === "topics") {
    const words = getWordsForTopic(selectedTopic);
    return wrap(
      <div style={{ padding: "20px", maxWidth: 480, margin: "0 auto" }}>
        <button onClick={goHome} style={{ background: "none", border: "none", color: C.textMuted, cursor: "pointer", fontSize: 13, fontWeight: 600, padding: "8px 0", marginBottom: 8 }}>← Назад</button>
        <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 20 }}>
          <div style={{ width: 48, height: 48, borderRadius: 16, background: C.primaryGlow, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24 }}>{TOPIC_ICONS[selectedTopic] || "📖"}</div>
          <div><h2 style={{ fontSize: 20, fontWeight: 800, margin: 0, color: C.primary }}>{selectedTopic}</h2><p style={{ fontSize: 12, color: C.textMuted, margin: "2px 0 0" }}>{words.length} слов</p></div>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: hasSpeechRecognition ? "1fr 1fr" : "1fr 1fr 1fr", gap: 8, marginBottom: 24 }}>
          {["flashcards", "quiz", "match", ...(hasSpeechRecognition ? ["speak"] : [])].map(m => (
            <button key={m} onClick={() => startSession(selectedTopic, m)} style={{ padding: "12px 6px", borderRadius: 14, border: "none", background: C.surface, color: C.text, cursor: "pointer", fontSize: 12, fontWeight: 700, boxShadow: shadow.sm }}>
              {{ flashcards: "🃏 Карточки", quiz: "✅ Тест", match: "🔗 Пары", speak: "🎙 Речь" }[m]}
            </button>
          ))}
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
          {words.map((w, i) => {
            const s = cardStates[w.gr];
            const sc = !s ? "#d4d0c8" : s.repetitions >= 3 ? C.success : C.warning;
            return (
              <div key={i} style={{ padding: "11px 14px", borderRadius: 10, background: C.surface, display: "flex", alignItems: "center", gap: 10 }}>
                <div style={{ width: 7, height: 7, borderRadius: "50%", background: sc }} />
                <span style={{ fontWeight: 700, color: C.primary, fontSize: 14 }}>{w.gr}</span>
                <span style={{ color: "#d4d0c8" }}>·</span>
                <span style={{ color: C.textSecondary, fontSize: 13, flex: 1 }}>{w.ru}</span>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  // ============ FLASHCARDS ============
  if (screen === "flashcards" && currentWord) {
    return wrap(
      <div style={{ padding: "20px", maxWidth: 480, margin: "0 auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <IconBtn onClick={goHome}>✕</IconBtn>
          <Badge>Карточки</Badge>
          <span style={{ fontSize: 13, color: C.textMuted, fontWeight: 700 }}>{currentIndex + 1}/{sessionWords.length}</span>
        </div>
        <ProgressBar value={currentIndex + 1} max={sessionWords.length} />
        <div onClick={() => setShowTranslation(!showTranslation)} style={{ marginTop: 32, padding: "48px 28px", borderRadius: 24, background: C.surface, cursor: "pointer", textAlign: "center", minHeight: 250, display: "flex", flexDirection: "column", justifyContent: "center", alignItems: "center", boxShadow: shadow.xl }}>
          {!showTranslation ? (<>
            <div style={{ fontSize: 38, fontWeight: 800, color: C.primary, marginBottom: 16 }}>{currentWord.gr}</div>
            <div style={{ fontSize: 13, color: C.textMuted }}>Нажми, чтобы перевернуть</div>
          </>) : (<>
            <div style={{ fontSize: 30, fontWeight: 800, color: C.primary, marginBottom: 10 }}>{currentWord.gr}</div>
            <div style={{ width: 32, height: 2, background: C.border, margin: "0 0 14px", borderRadius: 1 }} />
            <div style={{ fontSize: 22, fontWeight: 700, color: C.text, marginBottom: 6 }}>{currentWord.ru}</div>
            {currentWord.ex && <div style={{ fontSize: 13, color: C.textMuted, fontStyle: "italic", padding: "10px 16px", background: C.bg, borderRadius: 12, marginTop: 12, maxWidth: 300, lineHeight: 1.5 }}>{currentWord.ex}</div>}
          </>)}
        </div>
        {showTranslation && (
          <div style={{ display: "flex", gap: 8, marginTop: 24 }}>
            {[{ q: 0, l: "Не знаю", c: C.danger, b: C.dangerBg }, { q: 3, l: "Трудно", c: C.warning, b: C.warningBg }, { q: 4, l: "Знаю", c: C.teal, b: C.tealGlow }, { q: 5, l: "Легко", c: C.success, b: C.successBg }].map(({ q, l, c, b }) => (
              <button key={q} onClick={() => { rateCard(currentWord, q); nextCard(); }} style={{ flex: 1, padding: "14px 4px", borderRadius: 14, background: b, border: "none", color: c, fontSize: 13, fontWeight: 700, cursor: "pointer" }}>{l}</button>
            ))}
          </div>
        )}
      </div>
    );
  }

  // ============ QUIZ ============
  if (screen === "quiz" && currentWord) {
    return wrap(
      <div style={{ padding: "20px", maxWidth: 480, margin: "0 auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <IconBtn onClick={goHome}>✕</IconBtn>
          <Badge color={C.teal}>Тест</Badge>
          <span style={{ fontSize: 13, color: C.textMuted, fontWeight: 700 }}>{currentIndex + 1}/{sessionWords.length}</span>
        </div>
        <ProgressBar value={currentIndex + 1} max={sessionWords.length} color={C.teal} />
        <div style={{ textAlign: "center", margin: "48px 0 40px" }}>
          <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 14, letterSpacing: 1.5, textTransform: "uppercase", fontWeight: 700 }}>Как переводится?</div>
          <div style={{ fontSize: 36, fontWeight: 800, color: C.primary }}>{currentWord.gr}</div>
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {quizOptions.map((opt, i) => {
            const isC = opt.gr === currentWord.gr;
            const isS = quizAnswer === i;
            const show = quizAnswer !== null;
            let bg = C.surface, bc = "transparent", tc = C.text;
            if (show && isC) { bg = C.successBg; bc = C.success; tc = C.success; }
            if (show && isS && !isC) { bg = C.dangerBg; bc = C.danger; tc = C.danger; }
            return (
              <button key={i} onClick={() => { if (quizAnswer !== null) return; setQuizAnswer(i); rateCard(currentWord, isC ? 4 : 0); setTimeout(nextCard, 1000); }} style={{ padding: "16px 20px", borderRadius: 16, background: bg, border: `2px solid ${bc}`, color: tc, fontSize: 16, fontWeight: 600, cursor: quizAnswer !== null ? "default" : "pointer", textAlign: "left", boxShadow: show ? "none" : shadow.sm, transition: "all 0.2s" }}>{opt.ru}</button>
            );
          })}
        </div>
        {quizAnswer !== null && currentWord.ex && (
          <div style={{ marginTop: 16, padding: "12px 16px", borderRadius: 12, background: C.bg, fontSize: 13, color: C.textMuted, fontStyle: "italic" }}>{currentWord.ex}</div>
        )}
      </div>
    );
  }

  // ============ SPEAK ============
  if (screen === "speak" && currentWord) {
    return wrap(
      <div style={{ padding: "20px", maxWidth: 480, margin: "0 auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <IconBtn onClick={goHome}>✕</IconBtn>
          <Badge color="#8b5cf6">Произношение</Badge>
          <span style={{ fontSize: 13, color: C.textMuted, fontWeight: 700 }}>{currentIndex + 1}/{sessionWords.length}</span>
        </div>
        <ProgressBar value={currentIndex + 1} max={sessionWords.length} color="#8b5cf6" />
        <div style={{ textAlign: "center", margin: "40px 0 20px" }}>
          <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 14, letterSpacing: 1.5, textTransform: "uppercase", fontWeight: 700 }}>Произнеси слово</div>
          <div style={{ fontSize: 40, fontWeight: 800, color: C.primary, marginBottom: 8 }}>{currentWord.gr}</div>
          <div style={{ fontSize: 15, color: C.textSecondary }}>{currentWord.ru}</div>
          {currentWord.ex && <div style={{ fontSize: 12, color: C.textMuted, fontStyle: "italic", marginTop: 8 }}>{currentWord.ex}</div>}
        </div>

        {/* Mic button */}
        <div style={{ display: "flex", justifyContent: "center", margin: "32px 0" }}>
          <button onClick={() => startListening(currentWord.gr)} disabled={isListening} style={{
            width: 88, height: 88, borderRadius: "50%", border: "none",
            background: isListening ? "rgba(139,92,246,0.15)" : "#8b5cf6",
            color: isListening ? "#8b5cf6" : C.white,
            fontSize: 36, cursor: isListening ? "default" : "pointer",
            boxShadow: isListening ? "0 0 0 12px rgba(139,92,246,0.1)" : shadow.lg,
            transition: "all 0.3s", display: "flex", alignItems: "center", justifyContent: "center",
            animation: isListening ? "pulse 1.5s infinite" : "none",
          }}>🎙</button>
        </div>
        <style>{`@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }`}</style>

        <div style={{ textAlign: "center", minHeight: 60 }}>
          {isListening && <div style={{ color: "#8b5cf6", fontWeight: 600, fontSize: 14 }}>Слушаю...</div>}
          {speechResult === "error" && <div style={{ color: C.danger, fontWeight: 600 }}>Не удалось распознать. Попробуй ещё раз.</div>}
          {speechResult && speechResult !== "error" && (
            <div>
              <div style={{ fontSize: 13, color: C.textMuted, marginBottom: 6 }}>Распознано:</div>
              <div style={{ fontSize: 20, fontWeight: 700, color: speechScore === "correct" ? C.success : speechScore === "close" ? C.warning : C.danger }}>{speechResult}</div>
              <div style={{ marginTop: 8, fontSize: 14, fontWeight: 700, color: speechScore === "correct" ? C.success : speechScore === "close" ? C.warning : C.danger }}>
                {speechScore === "correct" ? "✓ Σωστά! Правильно!" : speechScore === "close" ? "≈ Близко, но не точно" : "✗ Попробуй ещё раз"}
              </div>
            </div>
          )}
        </div>

        <div style={{ display: "flex", gap: 10, marginTop: 24 }}>
          {speechScore && (
            <button onClick={() => { setSpeechResult(null); setSpeechScore(null); startListening(currentWord.gr); }} style={{ flex: 1, padding: "14px", borderRadius: 14, background: C.surface, border: "none", color: C.text, fontSize: 14, fontWeight: 700, cursor: "pointer", boxShadow: shadow.sm }}>Ещё раз</button>
          )}
          <button onClick={nextCard} style={{ flex: 1, padding: "14px", borderRadius: 14, background: C.primary, border: "none", color: C.white, fontSize: 14, fontWeight: 700, cursor: "pointer", boxShadow: shadow.md }}>Дальше →</button>
        </div>
      </div>
    );
  }

  // ============ MATCH ============
  if (screen === "match") {
    const grItems = matchPairs.filter(p => p.type === "gr");
    const ruItems = matchPairs.filter(p => p.type === "ru");
    const totalP = grItems.length;
    const matchedC = matchMatched.size / 2;
    const handleMatch = (item) => {
      if (matchMatched.has(item.pairId + "-" + item.type)) return;
      if (matchSelected.length === 0) setMatchSelected([item]);
      else if (matchSelected.length === 1) {
        const f = matchSelected[0];
        if (f.id === item.id) { setMatchSelected([]); return; }
        if (f.type === item.type) { setMatchSelected([item]); return; }
        if (f.pairId === item.pairId) {
          const nm = new Set([...matchMatched, f.pairId+"-"+f.type, item.pairId+"-"+item.type]);
          setMatchMatched(nm); setMatchSelected([]);
          const mw = sessionWords.find(w => w.gr === (f.type === "gr" ? f.text : item.text));
          if (mw) rateCard(mw, 4);
          if (nm.size / 2 >= totalP) setTimeout(() => navigateTo("results"), 700);
        } else {
          setMatchErrors(p => p + 1); setMatchSelected([f, item]);
          const mw = sessionWords.find(w => w.gr === (f.type === "gr" ? f.text : item.text));
          if (mw) rateCard(mw, 0);
          setTimeout(() => setMatchSelected([]), 500);
        }
      }
    };
    return wrap(
      <div style={{ padding: "20px", maxWidth: 480, margin: "0 auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <IconBtn onClick={goHome}>✕</IconBtn>
          <Badge color={C.accent}>Пары</Badge>
          <span style={{ fontSize: 13, color: C.textMuted, fontWeight: 700 }}>{matchedC}/{totalP}</span>
        </div>
        <ProgressBar value={matchedC} max={totalP} color={C.accent} />
        <div style={{ fontSize: 13, color: C.textSecondary, textAlign: "center", margin: "12px 0 20px" }}>
          Соедини слово с переводом{matchErrors > 0 && <span style={{ color: C.danger, marginLeft: 8, fontWeight: 700 }}>· {matchErrors} ош.</span>}
        </div>
        <div style={{ display: "flex", gap: 10 }}>
          {[grItems, ruItems].map((items, col) => (
            <div key={col} style={{ flex: 1, display: "flex", flexDirection: "column", gap: 8 }}>
              {items.map(item => {
                const isMtch = matchMatched.has(item.pairId + "-" + item.type);
                const isSel = matchSelected.some(s => s.id === item.id);
                const isWrong = matchSelected.length === 2 && isSel && matchSelected[0].pairId !== matchSelected[1].pairId;
                let bg = C.surface, bc = "transparent";
                if (isMtch) { bg = C.successBg; bc = C.success; }
                else if (isWrong) { bg = C.dangerBg; bc = C.danger; }
                else if (isSel) { bg = C.primaryGlow; bc = C.primary; }
                return (
                  <button key={item.id} onClick={() => handleMatch(item)} style={{ padding: "14px 10px", borderRadius: 14, fontSize: col === 0 ? 15 : 14, fontWeight: col === 0 ? 700 : 600, background: bg, border: `2px solid ${bc}`, color: isMtch ? C.success : col === 0 ? C.primary : C.text, cursor: isMtch ? "default" : "pointer", opacity: isMtch ? 0.45 : 1, transition: "all 0.15s" }}>{item.text}</button>
                );
              })}
            </div>
          ))}
        </div>
      </div>
    );
  }

  // ============ RESULTS ============
  if (screen === "results") {
    const correct = sessionResults.filter(r => r.quality >= 3).length;
    const total = sessionResults.length || 1;
    const pct = Math.round((correct / total) * 100);
    return wrap(
      <div style={{ padding: "40px 20px", maxWidth: 480, margin: "0 auto", textAlign: "center" }}>
        <div style={{ width: 80, height: 80, borderRadius: 24, background: pct >= 70 ? C.successBg : pct >= 40 ? C.warningBg : C.dangerBg, display: "inline-flex", alignItems: "center", justifyContent: "center", marginBottom: 20 }}>
          <span style={{ fontSize: 40 }}>{pct >= 80 ? "🎉" : pct >= 50 ? "💪" : "📚"}</span>
        </div>
        <h2 style={{ fontSize: 24, fontWeight: 800, margin: "0 0 6px", color: C.primary }}>{pct >= 80 ? "Μπράβο!" : pct >= 50 ? "Καλή δουλειά!" : "Συνέχισε!"}</h2>
        <p style={{ color: C.textMuted, fontSize: 14, margin: "0 0 28px" }}>{correct} из {total} правильно</p>
        <div style={{ display: "inline-flex", width: 130, height: 130, borderRadius: "50%", background: `conic-gradient(${pct >= 70 ? C.success : pct >= 40 ? C.warning : C.danger} ${pct}%, ${C.border} 0%)`, marginBottom: 28 }}>
          <div style={{ width: 108, height: 108, borderRadius: "50%", background: C.bg, margin: "auto", display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column" }}>
            <div style={{ fontSize: 30, fontWeight: 800, color: C.primary }}>{pct}%</div>
          </div>
        </div>
        {sessionResults.length > 0 && (
          <div style={{ textAlign: "left", marginBottom: 24 }}>
            {sessionResults.map((r, i) => (
              <div key={i} style={{ padding: "10px 14px", borderRadius: 10, marginBottom: 3, background: C.surface, display: "flex", justifyContent: "space-between", alignItems: "center", borderLeft: `3px solid ${r.quality >= 3 ? C.success : C.danger}` }}>
                <span style={{ fontWeight: 700, color: C.primary, fontSize: 14 }}>{r.word.gr}</span>
                <span style={{ color: C.textSecondary, fontSize: 13 }}>{r.word.ru}</span>
              </div>
            ))}
          </div>
        )}
        <div style={{ display: "flex", gap: 10 }}>
          <button onClick={goHome} style={{ flex: 1, padding: "15px", borderRadius: 14, background: C.surface, border: "none", color: C.text, fontSize: 14, fontWeight: 700, cursor: "pointer", boxShadow: shadow.sm }}>На главную</button>
          <button onClick={() => startSession(selectedTopic, exerciseMode)} style={{ flex: 1, padding: "15px", borderRadius: 14, background: C.primary, border: "none", color: C.white, fontSize: 14, fontWeight: 700, cursor: "pointer", boxShadow: shadow.md }}>Ещё раз</button>
        </div>
      </div>
    );
  }

  return wrap(<div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}><button onClick={goHome} style={{ padding: "16px 32px", borderRadius: 14, background: C.primary, border: "none", color: C.white, fontSize: 16, fontWeight: 700, cursor: "pointer" }}>На главную</button></div>);
}


        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
